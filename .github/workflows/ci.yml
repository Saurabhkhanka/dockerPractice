name: CI/CD (Docker Build & Push)

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# Permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid conflicts in concurrent Pages deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs: 
  # --- Backend Job ---
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 1. Docker Hub में लॉगिन करें
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 2. बिल्ड करें और पुश करें
      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/backend-practice:latest ./backend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/backend-practice:latest

  # --- Frontend Job ---
  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Docker Hub में लॉगिन करें
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 2. बिल्ड करें और पुश करें
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/frontend-practice:latest ./frontend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/frontend-practice:latest

  # --- GitHub Pages Deployment Job ---
  deploy-frontend-pages:
    runs-on: ubuntu-latest
    needs: build-and-push-frontend # Only deploy if build succeeds
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend static files
        run: |
          cd frontend
          npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
